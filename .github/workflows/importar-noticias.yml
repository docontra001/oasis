name: Importar Notícias

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  importar:
    runs-on: ubuntu-latest

    steps:
      - name: Chamar API do OASIS
        run: |
          curl \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.OASIS_CRON_URL }}"